name: Build and Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  prepare-release:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'dev'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump-version.outputs.version }}
      tag: ${{ steps.bump-version.outputs.tag }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Bump patch version
        id: bump-version
        shell: bash
        run: |
          current_version="$(bun --print "require('./package.json').version")"
          next_version="$(bun --print "(() => { const [major, minor, patch] = require('./package.json').version.split('.').map(Number); return [major, minor, patch + 1].join('.'); })()")"

          bun --eval "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.version = '${next_version}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\\n');
          "

          echo "version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${next_version}" >> "$GITHUB_OUTPUT"
          echo "Bumped version from ${current_version} to ${next_version}"

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): v${{ steps.bump-version.outputs.version }}"

      - name: Create tag
        run: git tag "v${{ steps.bump-version.outputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:main
          git push origin "v${{ steps.bump-version.outputs.version }}"

  build:
    needs: prepare-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron app
        run: bun run build
        timeout-minutes: 10
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          MAIN_VITE_TOOL_API_URL: ${{ secrets.MAIN_VITE_TOOL_API_URL }}

      - name: Package Electron app
        run: bunx electron-builder --${{ matrix.platform }} --publish never
        timeout-minutes: 15
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.yml
            dist/*.yaml
          if-no-files-found: ignore

  release:
    needs:
      - prepare-release
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
